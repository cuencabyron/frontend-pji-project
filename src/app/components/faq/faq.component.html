<section class="faq" id="faq">
  <div class="container">
    <h1>Preguntas <span>frecuentes</span></h1>

    <div class="faq-list">
      <div
        class="faq-item"
        *ngFor="let f of faqs; let i = index"
        [class.abierta]="activeIndex === i"
      >
        <button
          class="faq-pregunta"
          type="button"
          (click)="toggle(i)"
          [attr.aria-expanded]="activeIndex === i"
          [attr.aria-controls]="'faq-panel-' + i"
          [attr.id]="'faq-button-' + i"
        >
          <span>{{ f.pregunta }}</span>
          <span class="icon">{{ activeIndex === i ? '−' : '+' }}</span>
        </button>

        <div
          class="faq-respuesta"
          #panel
          [attr.id]="'faq-panel-' + i"
          role="region"
          [attr.aria-labelledby]="'faq-button-' + i"
          [style.maxHeight.px]="activeIndex === i ? panel.scrollHeight : 0"
        >
          {{ f.respuesta }}
        </div>
      </div>
    </div>
  </div>
</section>
