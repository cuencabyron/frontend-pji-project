# ============================================
# NGINX CONFIGURATION - FRONTEND + BACKEND PROXY
# ============================================
# Este archivo define la configuración para:
# - Servir una aplicación Angular (SPA)
# - Redirigir las peticiones /api al backend (Node/NestJS)
# ============================================

server {
  # Puerto donde Nginx escucha (HTTP)
  listen 80;

  # Nombre del servidor ( _ = cualquier dominio/IP )
  server_name _;

  # Ruta donde están los archivos compilados del frontend (dist)
  root /var/www/html;

  # Archivo principal que se sirve por defecto
  index index.html;

  # ============================================
  # FRONTEND (Angular SPA)
  # ============================================
  location / {

    # try_files intenta:
    # 1. Buscar archivo exacto (ej: /main.js)
    # 2. Buscar directorio (ej: /assets/)
    # 3. Si no existe → redirige a index.html
    #
    # Esto es CLAVE para Angular porque maneja rutas
    # del lado del cliente (ej: /contratar, /success)
    try_files $uri $uri/ /index.html;
  }

  # ============================================
  # BACKEND PROXY (/api)
  # ============================================
  location /api/ {

    # Redirige todas las peticiones /api al backend
    # Ejemplo:
    # /api/products → http://localhost:4000/api/products
    proxy_pass http://localhost:4000;

    # Usa HTTP 1.1 (necesario para websockets / keep-alive)
    proxy_http_version 1.1;

    # Headers necesarios para conexiones modernas
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';

    # Mantiene el host original de la petición
    proxy_set_header Host $host;

    # Evita cache en conexiones upgrade (ej: websockets)
    proxy_cache_bypass $http_upgrade;
  }
}